global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/openraft_alert_rules.yaml

scrape_configs:
  - job_name: openraft-node-1
    static_configs:
      - targets: [ "node1:8080" ]
    metrics_path: /metrics

  - job_name: openraft-node-2
    static_configs:
      - targets: [ "node2:8080" ]
    metrics_path: /metrics

  - job_name: openraft-node-3
    static_configs:
      - targets: [ "node3:8080" ]
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: [ "alertmanager:9093" ]

