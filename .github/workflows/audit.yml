name: Audit

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "33.1"
          repo-token: ${{ inputs.github-token }}
      - name: Run audit check
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}